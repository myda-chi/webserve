# Webserv Configuration File
# This is a sample configuration file for the webserv HTTP server

# Server block 1 - Main server
server {
    # Listen on host and port
    listen 127.0.0.1:8080;
    
    # Server names (virtual hosts)
    server_name localhost webserv.local;
    
    # Root directory for static files
    root ./www/html;
    
    # Default index files
    index index.html index.htm;
    
    # Client max body size (in bytes) - 10MB
    client_max_body_size 10485760;
    
    # Error pages
    error_page 404 /error_pages/404.html;
    error_page 500 502 503 504 /error_pages/50x.html;
    
    # Location block for root
    location / {
        # Allowed methods
        allowed_methods GET HEAD POST;
        
        # Enable/disable directory listing
        autoindex off;
    }
    
    # Location block for uploads
    location /uploads {
        allowed_methods GET HEAD POST DELETE;
        root ./www/uploads;
        upload_path ./www/uploads;
        autoindex on;
    }
    
    # Location block for CGI scripts
    location /cgi-bin {
        allowed_methods GET HEAD POST;
        root ./cgi-bin;
        autoindex on;
        
        # CGI configuration
        cgi_extension .php /usr/bin/php-cgi;
        cgi_extension .py /usr/bin/python3;
    }
    
    # Redirect example
    location /redirect {
        return 301 /;
    }
}

# Server block 2 - Alternative port
server {
    listen 127.0.0.1:8081;
    server_name localhost;
    
    root ./www/html;
    index index.html;
    
    client_max_body_size 2097152;
    
    error_page 404 /error_pages/404.html;
    
    location / {
        allowed_methods GET HEAD POST DELETE;
        autoindex on;
    }
}

# Server block 3 - Different host
server {
    listen 127.0.0.1:8082;
    server_name example.com www.example.com;
    
    root ./www/html;
    index index.html index.htm default.html;
    
    client_max_body_size 5242880;
    
    location / {
        allowed_methods GET HEAD;
        autoindex off;
    }
    
    location /api {
        allowed_methods GET HEAD POST DELETE;
        root ./www/api;
    }
}
