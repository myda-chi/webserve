<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Webserv</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .links a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .panel {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 8px;
        }
        .panel h3 {
            margin-top: 0;
        }
        /* Buttons */
        button {
            padding: 9px 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        button.secondary {
            background: rgba(255, 255, 255, 0.22);
        }
        button.delete-button {
            background: #e74c3c;
        }
        button.delete-button:hover {
            background: #c0392b;
        }
        /* Login form */
        .login-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .login-form input {
            flex: 1 1 180px;
            min-width: 0;
            padding: 9px 12px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
        }
        /* Upload form */
        .upload-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .upload-form input[type="file"] {
            flex: 1 1 220px;
            min-width: 0;
            color: #333;
            background: white;
            padding: 8px;
            border-radius: 5px;
        }
        .logout-form {
            margin-top: 14px;
        }
        /* Delete panel */
        .file-input {
            padding: 8px 10px;
            border-radius: 5px;
            border: none;
            font-size: 1em;
            margin-right: 8px;
            color: #222;
        }
        .result-message {
            margin-top: 10px;
            font-size: 0.9em;
            min-height: 1.2em;
        }
        .result-message.error  { color: #ffb3b3; }
        .result-message.success { color: #b3ffc6; }
        /* Credits */
        footer.credits {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85em;
            opacity: 0.75;
        }
        footer.credits .names {
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Welcome to Webserv!</h1>
        <p>Congratulations! Your HTTP server is up and running successfully.</p>
        <p>This is a custom-built HTTP/1.1 server written in C++98 as part of the 42 curriculum.</p>

        <div class="links">
            <a href="/cgi-bin">⚙️ CGI Scripts</a>
            <a href="/my-uploads">🗂️ My Uploads</a>
        </div>

        <!-- LOGIN / UPLOAD -->
        <div class="panel">
            <h3 id="auth-title">🔐 Login</h3>

            <!-- shown when logged OUT -->
            <form id="login-form" class="login-form" action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" maxlength="32" required>
                <button type="submit">Login</button>
            </form>

            <!-- shown when logged IN -->
            <div id="logged-in-box" class="hidden">
                <form class="upload-form" action="/uploads/" method="POST" enctype="multipart/form-data">
                    <input type="file" name="file" required>
                    <button type="submit">Upload</button>
                </form>

                <h3 style="margin-top: 24px;">🗑️ Delete a File</h3>
                <select id="filePath" class="file-input"></select>
                <button id="deleteButton" class="delete-button">Delete</button>
                <p id="resultMessage" class="result-message"></p>

                <form class="logout-form" action="/logout" method="POST">
                    <button class="secondary" type="submit">Logout</button>
                </form>
            </div>
        </div>

        <footer class="credits">
            Built for the 42 Webserv project by
            <span class="names">myda-chi, zsalih, hmensah</span>
        </footer>
    </div>

    <!-- DELETE SCRIPT -->
    <script>
        var select = document.getElementById('filePath');
        var resultMessage = document.getElementById('resultMessage');

        function loadFileOptions() {
            fetch('/my-uploads')
                .then(function (res) { return res.text(); })
                .then(function (html) {
                    var doc = new DOMParser().parseFromString(html, 'text/html');
                    select.innerHTML = '';
                    doc.querySelectorAll('a').forEach(function (a) {
                        var href = decodeURIComponent(a.getAttribute('href'));
                        var name = href.split('/').pop();
                        if (name && name !== '.' && name !== '..') {
                            var opt = document.createElement('option');
                            opt.value = name;
                            opt.textContent = name;
                            select.appendChild(opt);
                        }
                    });
                });
        }

        document.getElementById('deleteButton').addEventListener('click', function () {
            var filePath = select.value;
            if (!filePath) return;

            fetch('/uploads/' + encodeURIComponent(filePath), { method: 'DELETE' })
                .then(function (res) {
                    resultMessage.textContent = res.ok
                        ? 'Deleted "' + filePath + '"'
                        : 'Failed (status ' + res.status + ')';
                    resultMessage.className = 'result-message' + (res.ok ? ' success' : ' error');
                    loadFileOptions();
                });
        });

        loadFileOptions();
    </script>

    <!-- SESSION / LOGIN SCRIPT -->
    <script>
        (function () {
            var title      = document.getElementById('auth-title');
            var loginForm  = document.getElementById('login-form');
            var loggedInBox = document.getElementById('logged-in-box');

            function showLoggedOut() {
                title.textContent = '🔐 Login';
                loginForm.classList.remove('hidden');
                loggedInBox.classList.add('hidden');
            }

            function showLoggedIn(username) {
                title.textContent = 'Welcome, ' + username + '!';
                loginForm.classList.add('hidden');
                loggedInBox.classList.remove('hidden');
            }

            fetch('/session')
                .then(function (res) { return res.text(); })
                .then(function (text) {
                    var prefix = 'Logged in as ';
                    if (text.indexOf(prefix) !== 0) { showLoggedOut(); return; }
                    showLoggedIn(text.slice(prefix.length).split('\n')[0]);
                })
                .catch(showLoggedOut);
        }());
    </script>
</body>
</html>
